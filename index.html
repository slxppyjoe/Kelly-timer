<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count-Up Timer</title>
    <style>
        body {
            background: url('Kelly_and_me.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #timer {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: fit-content;
            max-width: 95%;
            margin-bottom: 20px;
        }
        #time {
            font-size: clamp(1.5rem, 8vw, 4rem); 
            font-weight: bold;
            margin: 0;
            white-space: nowrap; 
        }
        #timer p {
            font-size: 1.2rem;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        .debug-info {
            font-size: 0.8rem;
            opacity: 0.7;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="timer">
        <h2 id="time">00d 00h 00m 00s</h2>
        <p>Since we started dating</p>
    </div>

    <div class="debug-info">
        <div><strong>Now:</strong> <span id="current-now"></span></div>
        <div><strong>Start:</strong> <span id="start-debug"></span></div>
    </div>

    <script>
        const startDate = new Date("December 15, 2025 19:20:00");

        function updateTimer() {
            const now = new Date();
            
            // Debug displays
            document.getElementById('current-now').innerText = now.toLocaleString();
            document.getElementById('start-debug').innerText = startDate.toLocaleString();

            const distance = now - startDate;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById('time').innerHTML = `${days}d ${h}h ${m}m ${s}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

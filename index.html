<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey</title>
    <style>
        body {
            /* Updated to your new image filename */
            background: url('kelly_and_me2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #timer {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: fit-content;
            max-width: 90%;
            
            /* The Heartbeat Animation */
            animation: heartbeat 1.5s infinite ease-in-out;
        }

        /* Defining the pulse effect */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 0 10px 50px rgba(255, 255, 255, 0.15); }
            100% { transform: scale(1); }
        }

        #time {
            font-size: clamp(1.8rem, 8vw, 4rem); 
            font-weight: bold;
            margin: 0;
            white-space: nowrap; 
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.2rem;
            margin-top: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div id="timer">
        <h2 id="time">00d 00h 00m 00s</h2>
        <p>Since we started dating</p>
    </div>

    <script>
        const startDate = new Date("December 15, 2025 19:20:00");

        function updateTimer() {
            const now = new Date();
            let distance = now - startDate;

            // DST Correction: Keeps the hours consistent between seasons
            const offsetNow = now.getTimezoneOffset();
            const offsetStart = startDate.getTimezoneOffset();
            const dstAdjustment = (offsetNow - offsetStart) * 60 * 1000;
            distance -= dstAdjustment;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Leading zeros for layout stability
            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById('time').innerHTML = `${days}d ${h}h ${m}m ${s}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body>
</html>

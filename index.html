<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Journey</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
        }

        /* LAYER 1: The Blurred Background (Fills the gaps) */
        .bg-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('Kelly_and_me2.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(20px) brightness(0.5); /* Heavily blurred and dimmed */
            transform: scale(1.1); /* Prevents white edges from blur */
            z-index: -2;
        }

        /* LAYER 2: The Main Photo (Ensures no faces are cut off) */
        #bg-main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* 'contain' ensures the WHOLE photo fits. 
               'cover' is used on landscape where it already looks good. */
            object-fit: contain; 
            object-position: center;
        }

        /* On Desktop or Landscape phones, we can go back to Cover */
        @media (orientation: landscape) {
            #bg-main { object-fit: cover; }
            .bg-blur { display: none; }
        }

        #container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-bottom: 8vh;
            z-index: 1;
        }

        #snoopy-peeker {
            width: 140px; 
            position: absolute;
            top: 0;
            z-index: 1;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            will-change: transform;
            animation: peekaboo 6s infinite ease-in-out;
        }

        @keyframes peekaboo {
            0%, 15%, 85%, 100% { transform: translateY(0) translateZ(0); }
            30%, 70% { transform: translateY(-85%) translateZ(0); }
        }

        #timer {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 35px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: fit-content;
            max-width: 85%;
            z-index: 2;
            animation: heartbeat 2s infinite ease-in-out;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }

        #time {
            font-size: clamp(1.4rem, 6.5vw, 3.5rem);
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.85rem;
            margin-top: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .heart {
            position: absolute;
            color: #ffb6c1;
            font-size: 24px;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            z-index: 4;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-300px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>
    <img id="bg-main" src="Kelly_and_me2.jpg" alt="Background">

    <div id="container">
        <img id="snoopy-peeker" src="snoopy.gif" alt="Snoopy">
        <div id="timer">
            <h2 id="time">00d 00h 00m 00s</h2>
            <p>Since we started dating</p>
        </div>
    </div>

    <script>
        const startDate = new Date("December 15, 2025 19:20:00");

        function updateTimer() {
            const now = new Date();
            let distance = now - startDate;

            const offsetNow = now.getTimezoneOffset();
            const offsetStart = startDate.getTimezoneOffset();
            const dstAdjustment = (offsetNow - offsetStart) * 60 * 1000;
            distance -= dstAdjustment;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('time').innerHTML = 
                `${days}d ${hours.toString().padStart(2,'0')}h ${minutes.toString().padStart(2,'0')}m ${seconds.toString().padStart(2,'0')}s`;

            if (seconds % 2 === 0 && !document.querySelector(`.heart-s-${seconds}`)) {
                createHeart(seconds);
            }
        }

        function createHeart(id) {
            const container = document.getElementById('container');
            const heart = document.createElement('div');
            heart.classList.add('heart', `heart-s-${id}`);
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 80 + 10 + '%';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

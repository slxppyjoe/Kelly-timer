<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey</title>
    <style>
        body {
            background: url('Kelly_and_me2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            height: 100vh;
            margin: 0;
            overflow: hidden;
            padding-bottom: 60px; 
        }

        #timer {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: fit-content;
            max-width: 90%;
            position: relative;
            animation: heartbeat 2s infinite ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.015); box-shadow: 0 10px 50px rgba(255, 255, 255, 0.15); }
            100% { transform: scale(1); }
        }

        #time {
            font-size: clamp(1.8rem, 8vw, 4rem); 
            font-weight: bold;
            margin: 0;
            white-space: nowrap; 
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.2rem;
            margin-top: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .snoopy {
            position: absolute;
            width: 50px;
            height: auto;
            user-select: none;
            pointer-events: none;
            animation: floatUp 5s linear forwards;
            z-index: -1; /* Floats behind the text */
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-250px) rotate(15deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="timer">
        <h2 id="time">00d 00h 00m 00s</h2>
        <p>Since we started dating</p>
    </div>

    <script>
        const startDate = new Date("December 15, 2025 19:20:00");

        function updateTimer() {
            const now = new Date();
            let distance = now - startDate;

            // DST Correction
            const offsetNow = now.getTimezoneOffset();
            const offsetStart = startDate.getTimezoneOffset();
            const dstAdjustment = (offsetNow - offsetStart) * 60 * 1000;
            distance -= dstAdjustment;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById('time').innerHTML = `${days}d ${h}h ${m}m ${s}s`;

            // Create Snoopy every 3 seconds
            if (seconds % 3 === 0 && !document.querySelector(`.snoopy-s-${seconds}`)) {
                createSnoopy(seconds);
            }
        }

        function createSnoopy(id) {
            const timer = document.getElementById('timer');
            const snoopy = document.createElement('img');
            snoopy.classList.add('snoopy', `snoopy-s-${id}`);
            // Transparent Dancing Snoopy
            snoopy.src = 'https://media.giphy.com';
            snoopy.style.left = Math.random() * 70 + 15 + '%';
            timer.appendChild(snoopy);
            setTimeout(() => snoopy.remove(), 5000);
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body>
</html>

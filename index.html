<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Favorite Script</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Background Layers */
        .bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('Kelly_and_me2.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(20px) brightness(0.4);
            z-index: -2;
            transform: scale(1.1);
        }

        #bg-main {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            object-fit: contain;
            object-position: center;
        }

        @media (orientation: landscape) {
            #bg-main { object-fit: cover; }
            .bg-blur { display: none; }
        }

        #container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-bottom: 8dvh;
            z-index: 1;
        }

        #snoopy-peeker {
            width: 130px; 
            position: absolute;
            top: 0;
            z-index: 1;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            will-change: transform;
            animation: peekaboo 6s infinite ease-in-out;
        }

        @keyframes peekaboo {
            0%, 15%, 85%, 100% { transform: translateY(0) translateZ(0); }
            30%, 70% { transform: translateY(-85%) translateZ(0); }
        }

        /* Glassmorphism Design */
        #timer {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            padding: 25px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: fit-content;
            max-width: 85%;
            z-index: 2;
            animation: heartbeat 2s infinite ease-in-out;
            text-align: center;
            cursor: pointer;
        }

        /* Shimmering Gradient Text */
        #time {
            font-size: clamp(1.4rem, 6.5vw, 3.5rem);
            font-weight: 800;
            margin: 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            
            /* Shimmer Animation */
            background: linear-gradient(90deg, #ffffff, #ffd1dc, #ffffff, #ffd1dc, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        p {
            font-size: 0.8rem;
            margin: 8px 0 0 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        #milestone {
            font-size: 0.85rem;
            color: #ffb6c1;
            margin-top: 12px;
            font-weight: 600;
            font-style: italic;
            min-height: 1.2em;
        }

        .heart {
            position: fixed;
            color: #ffb6c1;
            font-size: 28px;
            pointer-events: none;
            animation: floatUp 3s ease-out forwards;
            z-index: 99;
            text-shadow: 0 0 10px rgba(255,182,193,0.5);
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -200px) scale(1.8); opacity: 0; }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>
    <img id="bg-main" src="Kelly_and_me2.jpg" alt="Background">

    <div id="container">
        <img id="snoopy-peeker" src="snoopy.gif" alt="Snoopy">
        <div id="timer" onclick="cycleUnits()">
            <h2 id="time">00d 00h 00m 00s</h2>
            <p id="label">since we've been dating</p>
            <div id="milestone"></div>
        </div>
    </div>

    <script>
        const startDate = new Date("December 15, 2025 19:20:00");
        let displayMode = 0; 

        const milestones = [
            "Every second is better with you",
            "My favorite adventure",
            "Easter Easter Easter!!!",
            "Better together",
            "A pewwwwwppp",
            "Still the one"
        ];

        function cycleUnits() {
            displayMode = (displayMode + 1) % 4;
            updateTimer(); 
        }

        function updateTimer() {
            const now = new Date();
            let distance = now - startDate;

            const offsetNow = now.getTimezoneOffset();
            const offsetStart = startDate.getTimezoneOffset();
            const dstAdjustment = (offsetNow - offsetStart) * 60 * 1000;
            distance -= dstAdjustment;

            const timeEl = document.getElementById('time');
            const labelEl = document.getElementById('label');

            if (displayMode === 0) {
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                timeEl.innerHTML = `${days}d ${hours.toString().padStart(2,'0')}h ${minutes.toString().padStart(2,'0')}m ${seconds.toString().padStart(2,'0')}s`;
                labelEl.innerHTML = "since we've been dating";
            } else if (displayMode === 1) {
                const totalSecs = Math.floor(distance / 1000).toLocaleString();
                timeEl.innerHTML = `${totalSecs}s`;
                labelEl.innerHTML = "total seconds shared";
            } else if (displayMode === 2) {
                const totalMins = Math.floor(distance / (1000 * 60)).toLocaleString();
                timeEl.innerHTML = `${totalMins}m`;
                labelEl.innerHTML = "total minutes shared";
            } else if (displayMode === 3) {
                const totalHours = Math.floor(distance / (1000 * 60 * 60)).toLocaleString();
                timeEl.innerHTML = `${totalHours}h`;
                labelEl.innerHTML = "total hours shared";
            }
            
            const milestoneIndex = Math.floor(now.getTime() / 5000) % milestones.length;
            document.getElementById('milestone').innerText = milestones[milestoneIndex];
        }

        function spawnHeart(x, y) {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤';
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }

        document.addEventListener('mousedown', (e) => {
            if (!e.target.closest('#timer')) spawnHeart(e.clientX, e.clientY);
        });
        
        document.addEventListener('touchstart', (e) => {
            if (!e.target.closest('#timer')) spawnHeart(e.touches[0].clientX, e.touches[0].clientY);
        });

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey</title>
    <style>
        body {
            background: url('Kelly_and_me2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            height: 100vh;
            margin: 0;
            overflow: hidden;
            padding-bottom: 40px;
        }

        #container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Creates a new stacking context for children */
            z-index: 1; 
        }

        /* Snoopy: Bigger and strictly layered */
        #snoopy-peeker {
            width: 180px; 
            position: absolute;
            bottom: 40px; /* Aligned with the top of the timer */
            z-index: 2; /* Layer 2: Middle (Behind text, in front of photo) */
            animation: peekaboo 6s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes peekaboo {
            0%, 15%, 85%, 100% { transform: translateY(110%); } /* Hidden behind timer */
            30%, 70% { transform: translateY(-40%); } /* Peeking way up */
        }

        #timer {
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 60px;
            border-radius: 30px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.7);
            width: fit-content;
            max-width: 90%;
            position: relative;
            animation: heartbeat 2s infinite ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 3; /* Layer 3: Front (In front of Snoopy) */
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        #time {
            font-size: clamp(1.8rem, 8vw, 4rem); 
            font-weight: 700;
            margin: 0;
            white-space: nowrap; 
            letter-spacing: 1px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.1rem;
            margin-top: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* Floating Hearts Layer */
        .heart {
            position: absolute;
            color: #ffb6c1;
            font-size: 28px;
            user-select: none;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            z-index: 4; /* Layer 4: Very Front */
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-350px) scale(1.6); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="container">
        <!-- Optimized Peeking Snoopy -->
        <img id="snoopy-peeker" src="https://media.giphy.com" alt="Snoopy">
        
        <div id="timer">
            <h2 id="time">00d 00h 00m 00s</h2>
            <p>Since we started dating</p>
        </div>
    </div>

    <script>
        const startDate = new Date("December 15, 2025 19:20:00");

        function updateTimer() {
            const now = new Date();
            let distance = now - startDate;

            // DST Correction
            const offsetNow = now.getTimezoneOffset();
            const offsetStart = startDate.getTimezoneOffset();
            const dstAdjustment = (offsetNow - offsetStart) * 60 * 1000;
            distance -= dstAdjustment;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById('time').innerHTML = `${days}d ${h}h ${m}m ${s}s`;

            if (seconds % 2 === 0 && !document.querySelector(`.heart-s-${seconds}`)) {
                createHeart(seconds);
            }
        }

        function createHeart(id) {
            const container = document.getElementById('container');
            const heart = document.createElement('div');
            heart.classList.add('heart', `heart-s-${id}`);
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 80 + 10 + '%';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body>
</html>

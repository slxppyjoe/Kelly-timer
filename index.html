<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelly Timer</title>
    <style>
        body {
            background-image: url('Kelly_and_me.jpg');
            background-size: cover;
            position: relative;
            color: white;
            font-family: Arial, sans-serif;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="content">
            <h1>Welcome to Kelly Timer</h1>
            <p>Your stopwatch for the best moments.</p>
        </div>
    </div>
</body>
</html>

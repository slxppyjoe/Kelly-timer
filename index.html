<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelly Timer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-image: url('Kelly_and_me.jpg');
            background-size: cover;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .timer {
            display: flex;
            gap: 20px;
            font-size: 2.5em;
            text-align: center;
        }
        .time-unit {
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.7);
        }
        .since {
            margin-top: 20px;
            font-size: 1.5em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="timer">
        <div class="time-unit" id="days">00</div><span>Days</span>
        <div class="time-unit" id="hours">00</div><span>Hours</span>
        <div class="time-unit" id="minutes">00</div><span>Minutes</span>
        <div class="time-unit" id="seconds">00</div><span>Seconds</span>
    </div>
    <div class="since">Since we started dating</div>
    <script>
        // Timer logic here
    </script>
</body>
</html>

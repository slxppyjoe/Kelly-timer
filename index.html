<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelly Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: url('Kelly_and_me.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        #timer {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            padding: 40px 60px;
            border-radius: 16px;
        }
        h1 {
            font-size: 3em;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }
        h2 {
            font-size: 1.6em;
            margin: 10px 0 0 0;
        }
    </style>
</head>
<body>
    <div id="timer">
        <h1 id="time-display">0d 00h 00m 00s</h1>
        <h2>Since We Started Dating</h2>
    </div>
    <script>
        const startTime = new Date('2025-12-15T19:20:00');
        const timeDisplay = document.getElementById('time-display');

        function updateTimer() {
            const now = new Date();
            const diff = Math.floor((now - startTime) / 1000);
            const days = Math.floor(diff / 86400);
            const hours = String(Math.floor((diff % 86400) / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
            const seconds = String(diff % 60).padStart(2, '0');
            timeDisplay.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Count-Up Timer</title>
    <style>
        body {
            background: url('Kelly_and_me.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #timer {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: fit-content;
            max-width: 90%;
        }
        #time {
            /* This ensures everything stays on one line */
            font-size: clamp(1.8rem, 6vw, 4rem); 
            font-weight: bold;
            margin: 0;
            letter-spacing: 1px;
            white-space: nowrap; 
        }
        #timer p {
            font-size: 1.2rem;
            margin-top: 15px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="timer">
        <h2 id="time">00d 00h 00m 00s</h2>
        <p>Since we started dating</p>
    </div>
    <script>
        // Using a string format helps the browser handle Daylight Savings correctly
        // Format: YYYY-MM-DDTHH:MM:SS (Note: December is 12 here, not 11)
        const startDate = new Date("2025-12-15T19:20:00");

        function updateTimer() {
            const now = new Date();
            const distance = now - startDate;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Padding with '0' ensures the text width stays consistent
            const h = hours.toString().padStart(2, '0');
            const m = minutes.toString().padStart(2, '0');
            const s = seconds.toString().padStart(2, '0');

            document.getElementById('time').innerHTML = `${days}d ${h}h ${m}m ${s}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

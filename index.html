<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Journey</title>
    <style>
        body {
            background: url('Kelly_and_me.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #timer {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Frosted glass effect */
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 80%;
            max-width: 500px;
        }
        #time {
            font-size: clamp(2rem, 8vw, 3.5rem); /* Responsive font size */
            font-weight: 700;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        p {
            font-size: 1.2rem;
            margin-top: 15px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="timer">
        <div id="time">00d 00h 00m 00s</div>
        <p>Since we started dating</p>
    </div>

    <script>
        // Note: Months are 0-indexed (11 = December)
        const startDate = new Date(2025, 11, 15, 19, 20, 0);

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / 1000 / 60) % 60);
            const s = Math.floor((diff / 1000) % 60);

            // Pad with leading zeros for a cleaner look
            const displayH = h.toString().padStart(2, '0');
            const displayM = m.toString().padStart(2, '0');
            const displayS = s.toString().padStart(2, '0');

            document.getElementById('time').innerText = `${d}d ${displayH}h ${displayM}m ${displayS}s`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

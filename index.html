<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Since We Started Dating</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-image: url('Kelly_and_me.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            color: white;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px;
        }
        .title {
            font-size: 2em;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
            font-style: italic;
        }
        .timer {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .time-unit {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 24px 32px;
            min-width: 110px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s;
        }
        .time-unit:hover {
            transform: scale(1.05);
        }
        .time-value {
            display: block;
            font-size: 3.5em;
            font-weight: bold;
            line-height: 1;
            text-shadow: 0 0 12px rgba(255, 182, 193, 0.9);
            letter-spacing: 0.02em;
        }
        .time-label {
            display: block;
            font-size: 0.85em;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0.85;
        }
        .subtitle {
            font-size: 1.3em;
            letter-spacing: 0.08em;
            font-style: italic;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="title"><span aria-label="heart">❤️</span> Our Love Story</p>
        <div class="timer">
            <div class="time-unit">
                <span class="time-value" id="days">0</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-unit">
                <span class="time-value" id="hours">0</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-unit">
                <span class="time-value" id="minutes">0</span>
                <span class="time-label">Minutes</span>
            </div>
            <div class="time-unit">
                <span class="time-value" id="seconds">0</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>
        <p class="subtitle">since we started dating</p>
    </div>
    <script>
        const startDate = new Date('2025-12-15T19:20:00Z');
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

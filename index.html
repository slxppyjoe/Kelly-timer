<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelly Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('Kelly_and_me.jpg') center/cover no-repeat;
            margin: 0;
        }
        #timer {
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 2.5em;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        h2 {
            font-size: 1.5em;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        #time-display {
            font-size: 3em;
            font-weight: bold;
            margin: 30px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <div id="timer">
        <h1>Time Since We Started Dating</h1>
        <h2 id="time-display">0 days 0 hours 0 minutes 0 seconds</h2>
        <h2>Since We Started Dating</h2>
    </div>
    <script>
        const startTime = new Date('2025-12-15T19:20:00'); // December 15, 2025 at 7:20 PM
        const timeDisplay = document.getElementById('time-display');

        function updateTimer() {
            const now = new Date();
            const diff = Math.floor((now - startTime) / 1000);
            
            const days = Math.floor(diff / (24 * 3600));
            const hours = Math.floor((diff % (24 * 3600)) / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;
            
            timeDisplay.textContent = `${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
